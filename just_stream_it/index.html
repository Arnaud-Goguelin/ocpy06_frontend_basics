
<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ===== basic SEO tags ===== -->
    <title>JustStreamIt — Films à la demande : les mieux notés, par catégorie</title>
    <meta name="description" content="Découvrez les meilleurs films à la demande sur JustStreamIt. Parcourez les films les mieux notés, par genre et par catégorie.">
    <meta name="keywords" content="films, streaming, vidéo à la demande, meilleurs films, cinéma, JustStreamIt">
    <meta name="author" content="JustStreamIt">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://www.juststreamit.example.com/">

    <!-- ===== Open Graph (Facebook, LinkedIn…) ===== -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="JustStreamIt — Films à la demande">
    <meta property="og:description" content="Parcourez les meilleurs films à la demande, classés par note et par catégorie.">
    <meta property="og:url" content="https://www.juststreamit.example.com/">
    <meta property="og:image" content="https://www.juststreamit.example.com/img/og-cover.jpg">
    <meta property="og:locale" content="fr_FR">
    <meta property="og:site_name" content="JustStreamIt">

    <!-- ===== Twitter Card ===== -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="JustStreamIt — Films à la demande">
    <meta name="twitter:description" content="Parcourez les meilleurs films à la demande, classés par note et par catégorie.">
    <meta name="twitter:image" content="https://www.juststreamit.example.com/img/og-cover.jpg">

    <!-- ===== Google Rich Snippets (JSON-LD) ===== -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "JustStreamIt",
        "url": "https://www.juststreamit.example.com/",
        "description": "Plateforme de films à la demande — découvrez les meilleurs films par note et par catégorie.",
        "potentialAction": {
            "@type": "SearchAction",
            "target": "https://www.juststreamit.example.com/search?q={search_term_string}",
            "query-input": "required name=search_term_string"
        }
    }
    </script>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "ItemList",
        "name": "Films les mieux notés",
        "itemListOrder": "https://schema.org/ItemListOrderDescending",
        "numberOfItems": 7,
        "itemListElement": []
    }
    </script>
    <!-- ===== CSS imports ===== -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="container mt-3xl mb-3xl">
        <nav>
            <a href="/#"><img src="assets/images/logo.webp"></a>
            <h1 class="ml-3xl">Vidéos à la demande</h1>
        </nav>
    </header>

    <main class="container mb-3xl">

        <section id="best-movie" class="mb-xl">
            <h2 class="mb-xl">Meilleur film</h2>
            <article id="best-movie-content" class="card">
<!--                populated by JS-->
            </article>
        </section>

        <section id="top-rated" >
            <h2>Films les mieux notés</h2>
            <div class="grid">
<!--                populated by JS-->
            </div>
            <button class="primary-button">Voir plus</button>
        </section>

        <section id="random-category-one">
            <h2>Catégorie</h2>
            <div class="grid">
<!--                populated by JS-->
            </div>
            <button class="primary-button">Voir plus</button>
        </section>

        <section id="random-category-two">
            <h2>Catégorie</h2>
            <div class="grid">
<!--                populated by JS-->
            </div>
            <button class="primary-button">Voir plus</button>
        </section>

        <section id="other-category">
            <div class="category-selector">
                <h2>Autres :</h2>
                <label for="category-select">Sélectionner une catégorie</label>
                <select id="category-select">
<!--                populated by JS-->
                </select>
            </div>
            <div class="grid">
<!--                populated by JS-->
            </div>
            <button class="primary-button">Voir plus</button>
        </section>

    </main>

    <footer class="container">
        <p>JustStreamIt</p>
    </footer>

    <!-- ===== modal ===== -->
    <template id="movie-modal-template">
        <div class="background-modal">
            <div class="modal">
                <button class="close-button-tablet-mobile" aria-label="close">❌</button>
                <div class="movie-presentation">
                    <div>
                        <h3>The Big Lebowski</h3>
                        <dl>
                            <dt class="dt-hidden">Année - classification</dt>
                                <dd>1998 - Comedy, Crime, Sport</dd>
                            <dt class="dt-hidden">filtre PG - Durée</dt>
                                <dd>PG-13 - 117 minutes (USA / UK)</dd>
                            <div class="dl-inline">
                                <dt>IMDB score:</dt>
                                    <dd> 8.1/10</dd>
                            </div>
                            <div class="dl-inline">
                                <dt>Recettes au box-office:</dt>
                                    <dd>$48.2m</dd>
                            </div>
                            <div class="director">
                                <dt>Réalisé par: </dt>
                                    <dd>Joel Coen, Ethan Coen</dd>
                            </div>
                        </dl>
                    </div>
                    <img class="modal-desktop-img" src="assets/images/the_big_lebowski.webp"
                         alt="affiche du film - - -">
                </div>
                <dl class="movie-description">
                    <dt class="dt-hidden">Synopsis</dt>
                        <dd>When "the dude" Lebowski is mistaken for a millionaire Lebowski, two thugs urinate on his rug to
                            coerce him into paying a debt he knows nothing about. While attempting to gain recompense for the ruined rug from his wealthy counterpart,
                            he accepts a one-time job with high pay-off.
                            He enlists the help of his bowling buddy, Walter, a gun-toting Jewish-convert with anger issues.
                            Deception leads to more trouble, and it soon seems that everyone from porn empire tycoons to
                            nihilists want something from The Dude.</dd>
                    <img class="modal-tablet-img" src="assets/images/the_big_lebowski.webp"
                         alt="affiche du film - - -">
                    <dt class="dt-hidden">Acteurs</dt>
                        <dd class="actors"><div>Avec:</div>
                            David Huddleston, Flea, Jack Kehler, Jeff Bridges, Jimmie Dale
                            Gilmore, John Goodman, John Turturro, Julianne Moore, Mark Pellegrino, Peter Stormare, Philip Moon, Philip Seymour Hoffman,
                            Steve Buscemi, Tara Reid, Torsten Voges</dd>
                </dl>
                <button class="primary-button close-button-desktop" aria-label="close">Fermer</button>
            </div>
        </div>
    </template>



    <!-- ===== scripts ===== -->
    <script src="js/modal.js" type="module"></script>
    <script src="js/app.js" type="module"></script>

</body>
</html>
